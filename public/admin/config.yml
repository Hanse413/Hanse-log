backend:
  name: github
  repo: Hanse413/Hanse-log
  branch: main
  base_url: https://sveltia-cms-auth.hanse413.workers.dev

media_folder: public/images
public_folder: /images

collections:
  - name: log
    label: Daily Log
    folder: src/content/log
    create: true
    extension: md
    format: frontmatter
    slug: "{{fields.date}}"
    summary: "{{date}} — {{title}}"
    sortable_fields: [date]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DD", time_format: false }
      - { name: tags, label: Tags, widget: list, required: false }
      - { name: body, label: Entry, widget: markdown }
